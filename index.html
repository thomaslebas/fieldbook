<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TULB / Pokemon Go Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="fieldbook.js"></script>
<script src="pokedex.js"></script>
<style>
  :root {
    --bg: #e8f5e9;
    --surface: #ffffff;
    --surface2: #f0faf0;
    --border: #d4ecd4;
    --blue: #1a7a6e;
    --blue-dark: #125c54;
    --yellow: #ffcb05;
    --yellow-dark: #e6b800;
    --red: #cc0000;
    --teal: #1a7a6e;
    --text: #1a3a2e;
    --muted: #6a8f8a;
    --shadow: 0 2px 12px rgba(26,122,110,0.08);
    --shadow-hover: 0 4px 20px rgba(26,122,110,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #f4fbf4 0%, #c8eec8 50%, #a0d8a0 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }


  /* LAYOUT */
  .app-container {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      ".       tabs"
      "profile content";
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    gap: 0 24px;
  }

  /* PROFILE CARD */
  .profile-card {
    grid-area: profile;
    align-self: start;
    position: sticky;
    top: 94px;
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 24px;
  }

    .profile-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding-bottom: 16px;
  }

  .profile-header-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .profile-header-side {
    width: 100%;
  }

  .profile-stats-grid {
    width: 100%;
  }

    .logo-badge {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    margin-bottom: 10px;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-family: 'Lato', sans-serif;
    font-size: 26px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }

    .profile-sub {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    margin-top: 4px;
  }

  .profile-toggle {
    display: none;
  }

        .profile-meta {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 0;
  }

    .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--muted);
  }
  .meta-row strong {
    color: var(--text);
    font-weight: 700;
  }

        .profile-divider {
    height: 1px;
    background: var(--border);
  }

    .profile-section-label {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

      .profile-stat {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .profile-stat:last-of-type { border-bottom: none; }

    .profile-stat-label {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 700;
    margin-bottom: 2px;
  }

    .profile-stat-value {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
  }

    .profile-stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* CONTENT AREA */
  .content-area {
    grid-area: content;
  }

  /* NAV TABS */
  nav {
    grid-area: tabs;
    display: flex;
    justify-content: center;
    padding-bottom: 0;
    margin-bottom: 0;
  }

  .tab {
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Lato', sans-serif;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* PANELS */
  .panel { display: none; padding: 24px; }
  .panel.active { display: block; }

  /* SECTION TITLES */
  .section-title {
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* CHART CARDS */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow);
  }



  .chart-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .chart-sub {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  canvas { width: 100% !important; }

  /* MAP STATS STRIP */
  .map-stats-strip {
    display: flex;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .map-stat {
    flex: 1;
    padding: 14px 16px;
    border-right: 1px solid var(--border);
  }
  .map-stat:last-child { border-right: none; }

  .map-stat-label {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .map-stat-value {
    font-size: 24px;
    font-weight: 900;
    color: var(--text);
  }

  /* MAP */
  #map {
    height: 400px;
    background: var(--surface);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    outline: none;
  }

  .leaflet-container {
    outline: none;
  }

  .leaflet-tile-pane {
    filter: saturate(0.55) brightness(1.08);
  }

  .map-legend {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    font-size: 14px;
    color: var(--muted);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  /* POKEMON GRID */
  .pokemon-search {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 0 0 12px;
  }

  .pokemon-search input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 16px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    flex: 1;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .pokemon-search input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,122,110,0.12); }
  .pokemon-search input::placeholder { color: var(--muted); }

  .pokemon-search select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .pokemon-search select:focus { border-color: var(--blue); }

  .pokemon-count {
    font-size: 14px;
    color: var(--muted);
    white-space: nowrap;
  }

  .pokemon-count-row {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    padding: 4px 0 12px;
  }

  .pokemon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }

  .pokemon-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
  }


  .xp-bar-block {
    padding: 8px 0 10px;
    border-bottom: 1px solid var(--border);
  }

  .xp-bar-top {
    margin-bottom: 6px;
  }

  .xp-level {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }

  .xp-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .xp-bar-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
    max-width: 100%;
  }

  .xp-bar-bottom {
    display: flex;
    justify-content: flex-end;
    margin-top: 4px;
  }

  .xp-fraction {
    font-size: 11px;
    color: var(--muted);
  }

        .profile-data-as-of {
    font-size: 14px;
    color: var(--muted);
    padding-top: 12px;
  }

  .poke-sprite {
    width: 96px;
    height: 96px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .poke-sprite.sprite-missing {
    background: var(--surface2);
    border-radius: 6px;
  }

  .pokemon-card--unknown { opacity: 0.4; }

  .poke-sprite-unknown {
    width: 96px;
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--muted);
    font-weight: 900;
    flex-shrink: 0;
  }

  .poke-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .poke-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  .spend-chart-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .spend-chart-block {
    flex: 1;
    min-width: 0;
  }

  .spend-chart-total {
    flex-shrink: 0;
    width: 110px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: left;
  }

  .spend-chart-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* SPENDING */
  .spend-currency-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .spend-currency-row:last-child { margin-bottom: 0; }

  .spend-currency-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    width: 32px;
    flex-shrink: 0;
  }

  .spend-currency-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .spend-currency-bar {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
  }

  .spend-currency-amount {
    font-size: 16px;
    font-weight: 900;
    color: var(--text);
    width: 72px;
    text-align: right;
    flex-shrink: 0;
  }

  .spend-economy-main {
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .spend-economy-row {
    display: flex;
    gap: 0;
  }

  .spend-economy-cell {
    flex: 1;
  }

  .spend-economy-divider {
    width: 1px;
    background: var(--border);
    margin: 0 16px;
  }

  .spend-economy-value {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
    margin-top: 4px;
  }

  .spend-stats-row {
    display: flex;
    gap: 0;
    flex-wrap: wrap;
  }

  .spend-stat {
    flex: 1;
    min-width: 120px;
    padding: 4px 20px 4px 0;
    border-right: 1px solid var(--border);
    margin-right: 20px;
  }
  .spend-stat:last-child { border-right: none; margin-right: 0; }

  .spend-total {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
    margin: 4px 0 2px;
    word-break: break-word;
  }

  .spend-highlight {
    font-size: 32px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    margin: 4px 0 2px;
  }

  /* ACTIVITY NOTE */
  .activity-note {
    background: var(--surface2);
    border-left: 4px solid var(--blue);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.7;
  }

  @media (max-width: 800px) {
    .app-container {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
      grid-template-areas:
        "profile"
        "tabs"
        "content";
      padding: 16px;
      gap: 16px 0;
    }

    .profile-card {
      width: 100%;
      position: static;
    }

    .profile-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: stretch;
      text-align: left;
      padding-bottom: 0;
    }

    .profile-header-main {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 10px;
      align-items: center;
      align-content: center;
    }

    .profile-header-main .logo-badge {
      grid-row: 1 / 3;
      width: 72px;
      height: 72px;
      margin-bottom: 0;
    }

    .profile-header-main h1 {
      grid-column: 2;
      grid-row: 1;
      font-size: 20px;
    }

    .profile-header-main .profile-sub {
      grid-column: 2;
      grid-row: 2;
      margin-top: 0;
    }

    .profile-header-side {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 100%;
    }

    .profile-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      flex: 1;
    }

    .profile-stats-grid .profile-stat {
      border-bottom: none;
      padding: 0;
    }

    .profile-stats-grid .profile-stat-label {
      font-size: 12px;
      letter-spacing: 0.05em;
      margin-bottom: 1px;
    }

    .profile-stats-grid .profile-stat-value {
      font-size: 18px;
    }

    .profile-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      align-self: flex-end;
      margin-top: auto;
      padding: 0;
      border: none;
      background: none;
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }

    .profile-toggle-chevron {
      width: 7px;
      height: 7px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      transition: transform 0.2s;
    }

    .profile-card:not(.is-collapsed) .profile-toggle-chevron {
      transform: rotate(-135deg);
    }

    .profile-card.is-collapsed > .profile-divider,
    .profile-card.is-collapsed > .profile-meta,
    .profile-card.is-collapsed > .profile-data-as-of {
      display: none;
    }

    .panel {
      padding: 0;
    }

    .spend-stats-row {
      flex-wrap: wrap;
      gap: 16px;
    }

    .spend-stat {
      min-width: calc(50% - 16px);
    }

    .pokemon-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    nav {
      flex-wrap: wrap;
    }
  }

  .pokedex-gen-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 24px 0 10px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 14px;
  }

  .pokedex-gen-header:first-child { padding-top: 0; }

  .pokedex-gen-name {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
  }

  .pokedex-gen-count {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .pokemon-card--uncaught {
    background: #fce8e8;
    border-color: #f0b8b8;
  }
  .pokemon-card--uncaught .poke-sprite {
    filter: brightness(0);
    opacity: 0.35;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel.active > * {
    animation: fadeUp 0.35s ease both;
  }

  .panel.active > *:nth-child(2) { animation-delay: 0.05s; }
  .panel.active > *:nth-child(3) { animation-delay: 0.1s; }
  .panel.active > *:nth-child(4) { animation-delay: 0.15s; }

</style>
</head>
<body>

<div class="app-container">

  <!-- PROFILE CARD (sidebar) -->
  <aside class="profile-card is-collapsed">
    <div class="profile-header">
      <div class="profile-header-main">
        <img class="logo-badge" src="avatar.png" alt="Trainer avatar">
        <h1 id="stat-username"></h1>
        <div class="profile-sub" id="stat-team"></div>
      </div>
      <div class="profile-header-side">
        <div class="profile-stats-grid">
          <div class="profile-stat">
            <div class="profile-stat-label">Level</div>
            <div class="profile-stat-value" id="stat-level"></div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-label">Pokédex</div>
            <div class="profile-stat-value">931</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-label">Distance walked</div>
            <div class="profile-stat-value" id="stat-distance"></div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-label">Encounters</div>
            <div class="profile-stat-value" id="stat-encounters"></div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-label">Pokestop spins</div>
            <div class="profile-stat-value" id="stat-spins"></div>
          </div>
        </div>
        <button type="button" class="profile-toggle" onclick="toggleProfileCard()" aria-expanded="false">
          <span class="profile-toggle-label">Show</span>
          <span class="profile-toggle-chevron" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <div class="profile-divider"></div>

    <div class="profile-meta">
      <div class="meta-row"><span>Started</span><strong id="stat-start-date"></strong></div>
      <div class="meta-row"><span>XP</span><strong id="stat-xp"></strong></div>
      <div class="meta-row"><span>Stardust</span><strong id="stat-stardust"></strong></div>
      <div class="meta-row"><span>Collection</span><strong id="stat-collection"></strong></div>
    </div>

    <div class="profile-divider"></div>

    <div class="profile-data-as-of" id="stat-data-as-of"></div>

  </aside>

  <!-- NAV TABS -->
  <nav>
    <button class="tab active" onclick="showTab('pokedex')">Pokédex</button>
    <button class="tab" onclick="showTab('activity')">Activity</button>
    <button class="tab" onclick="showTab('pokemon')" style="display:none">Collection</button>
    <button class="tab" onclick="showTab('spending')">Spending</button>
  </nav>

  <!-- CONTENT AREA -->
  <div class="content-area">

<!-- ACTIVITY -->
<div id="activity" class="panel">
  <div class="chart-card" style="margin-bottom:20px; padding-bottom:0;">
    <div class="chart-title">Where I've played</div>
    <div id="map" style="margin: 0 -24px;"></div>
  </div>

  <div class="chart-grid">
    <div class="chart-card full">
      <div class="chart-title">Pok&eacute;mon Encountered</div>
      <canvas id="encChart" height="200"></canvas>
    </div>
    <div class="chart-card full">
      <div class="chart-title">Pok&eacute;stop Spins</div>
      <canvas id="spinChart" height="200"></canvas>
    </div>
  </div>
</div>

<!-- POKEMON -->
<div id="pokemon-panel" class="panel">
  <div class="pokemon-search">
    <input type="text" id="pokeSearch" placeholder="Search your collection..." oninput="filterPokemon()">
    <select id="pokeSort" onchange="filterPokemon()">
      <option value="name-az">Name A–Z</option>
      <option value="name-za">Name Z–A</option>
      <option value="dex-asc" selected>Dex № Low–High</option>

<script>

// TAB SWITCHING
function toggleProfileCard() {
  const card = document.querySelector('.profile-card');
  const btn = document.querySelector('.profile-toggle');
  const collapsed = card.classList.toggle('is-collapsed');
  btn.setAttribute('aria-expanded', String(!collapsed));
  btn.querySelector('.profile-toggle-label').textContent = collapsed ? 'Show' : 'Hide';
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  const panelId = tab === 'pokemon' ? 'pokemon-panel' : tab === 'spending' ? 'spending-panel' : tab === 'pokedex' ? 'pokedex-panel' : 'activity';
  document.getElementById(panelId).classList.add('active');
}

// CHART DEFAULTS
Chart.defaults.color = '#6a8f8a';
Chart.defaults.borderColor = '#d4ecd4';
Chart.defaults.font.family = "'Lato', sans-serif";
Chart.defaults.font.size = 12;

const YELLOW = '#ffcb05';
const BLUE = '#1a7a6e';
const TEAL = '#1a7a6e';
const PINK = '#cc0000';

function populateFromData(DATA) {
  const a = DATA.account;
  const act = DATA.activity;
  const pur = DATA.purchases;

  // Helpers
  const fmt = n => Math.round(n).toLocaleString();
  const fmtDec = (n, d) => n.toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  const teamColours = { Valor: '#cc0000', Mystic: '#005aff', Instinct: '#ffcb05' };

  // Page title
  document.title = a.username + ' / Pokémon GO Archive';

  // Profile sidebar
  document.getElementById('stat-username').textContent = a.username;
  const teamEl = document.getElementById('stat-team');
  teamEl.innerHTML = `<i class="fa-solid fa-dove" style="margin-right:6px"></i>Team ` + a.team;
  teamEl.style.color = teamColours[a.team] || 'inherit';
  document.getElementById('stat-level').textContent = a.level;
  document.getElementById('stat-distance').textContent = fmtDec(a.distance_km, 0) + ' km';
  document.getElementById('stat-encounters').textContent = fmt(act.encounters.total);
  document.getElementById('stat-spins').textContent = fmt(act.pokestop_spins.total);

  // Format start date from "07/06/2016" → "07 Jun 2016"
  const [d, mo, y] = a.start_date.split('/');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('stat-start-date').textContent = d + ' ' + months[parseInt(mo, 10) - 1] + ' ' + y;

  document.getElementById('stat-xp').textContent = fmt(a.xp);
  document.getElementById('stat-stardust').textContent = fmt(a.stardust);
  document.getElementById('stat-collection').textContent = fmt(DATA.collection.total);

  // "Data as of" — derive from last encounter date e.g. "28 Dec 2025" → "Dec 2025"
  const lastParts = act.encounters.last.split(' ');
  document.getElementById('stat-data-as-of').textContent = 'Data as of ' + lastParts[1] + ' ' + lastParts[2];

  // Spending — currency totals
  const totals = pur.total_by_currency;
  document.getElementById('spend-total-nzd').textContent = '$' + fmtDec(totals.NZD, 2);
  document.getElementById('spend-total-cad').textContent = '$' + fmtDec(totals.CAD, 2);
  document.getElementById('spend-total-gbp').textContent = '£' + fmtDec(totals.GBP, 2);

  // Spending — transaction stats
  const stats = pur.stats;
  document.getElementById('spend-items').textContent = fmt(stats.items_purchased);
  document.getElementById('spend-topups').textContent = fmt(stats.coin_topups);
  document.getElementById('spend-coinspends').textContent = fmt(stats.coin_spends);
}

function initApp(DATA) {
  populateFromData(DATA);

// Shared x-axis: union of all encounter + spin months, sorted
const encByMonth = Object.fromEntries(DATA.activity.encounters.monthly.map(d => [d.year_month, d.count]));
const spinByMonth = Object.fromEntries(DATA.activity.pokestop_spins.monthly.map(d => [d.year_month, d.count]));
const allMonths = [...new Set([
  ...DATA.activity.encounters.monthly.map(d => d.year_month),
  ...DATA.activity.pokestop_spins.monthly.map(d => d.year_month)
])].sort();

const encValues = allMonths.map(m => encByMonth[m] || 0);
const spinValues = allMonths.map(m => spinByMonth[m] || 0);
const encMax = Math.max(...encValues);
const spinMax = Math.max(...spinValues);

const yearOnlyTicks = {
  autoSkip: false,
  maxRotation: 0,
  callback: (val, i) => {
    const label = allMonths[i];
    return label && label.endsWith('-01') ? label.slice(0, 4) : null;
  },
};

// ENCOUNTER CHART
new Chart(document.getElementById('encChart'), {
  type: 'bar',
  data: {
    labels: allMonths,
    datasets: [{
      label: 'Encounters',
      data: encValues,
      backgroundColor: allMonths.map((m, i) => `rgba(26,122,110,${0.3 + 0.7 * encValues[i] / encMax})`),
      borderColor: BLUE,
      borderWidth: 0,
      borderRadius: 2,
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false }, ticks: yearOnlyTicks },
      y: { grid: { color: '#e0e0e8' } }
    }
  }
});

// SPIN CHART
new Chart(document.getElementById('spinChart'), {
  type: 'bar',
  data: {
    labels: allMonths,
    datasets: [{
      label: 'Spins',
      data: spinValues,
      backgroundColor: allMonths.map((m, i) => `rgba(255,203,5,${0.3 + 0.7 * spinValues[i] / spinMax})`),
      borderColor: YELLOW,
      borderWidth: 0,
      borderRadius: 2,
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false }, ticks: yearOnlyTicks },
      y: { grid: { color: '#e0e0e8' } }
    }
  }
});


// SPEND CHARTS - shared x-axis from 2016-07 to 2025-07
const allSpendMonths = [];
let d = new Date(2016, 6); // Jul 2016
const end = new Date(2025, 6); // Jul 2025
while (d <= end) {
  allSpendMonths.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  d.setMonth(d.getMonth()+1);
}

function spendChartData(raw) {
  const byMonth = Object.fromEntries(raw.map(r => [r.year_month, r.amount]));
  return allSpendMonths.map(m => byMonth[m] || 0);
}

const spendOpts = (symbol) => ({
  responsive: true,
  plugins: { legend: { display: false }, tooltip: {
    callbacks: { label: ctx => symbol + ctx.parsed.y.toFixed(2) }
  }},
  scales: {
    x: {
      grid: { display: false },
      ticks: {
        maxTicksLimit: 20,
        callback: function(val, index) {
          const label = allSpendMonths[index];
          return label && label.endsWith('-01') ? label.slice(0, 4) : '';
        }
      }
    },
    y: { grid: { color: '#e0e0e8' }, ticks: { callback: v => v ? symbol + v : '' }, beginAtZero: true }
  }
});

new Chart(document.getElementById('spendNZD'), {
  type: 'bar',
  data: { labels: allSpendMonths, datasets: [{ data: spendChartData(DATA.purchases.monthly_by_currency.NZD), backgroundColor: 'rgba(59,76,202,0.6)', borderRadius: 2 }] },
  options: spendOpts('$')
});

new Chart(document.getElementById('spendCAD'), {
  type: 'bar',
  data: { labels: allSpendMonths, datasets: [{ data: spendChartData(DATA.purchases.monthly_by_currency.CAD), backgroundColor: 'rgba(59,76,202,0.6)', borderRadius: 2 }] },
  options: spendOpts('$')
});

new Chart(document.getElementById('spendGBP'), {
  type: 'bar',
  data: { labels: allSpendMonths, datasets: [{ data: spendChartData(DATA.purchases.monthly_by_currency.GBP), backgroundColor: 'rgba(59,76,202,0.6)', borderRadius: 2 }] },
  options: spendOpts('£')
});

// MAP
function initMap() {
  const map = L.map('map', {
    zoomControl: true,
  });

  const latlngs = DATA.activity.encounters.locations.map(loc => [loc.lat, loc.lng]);
  map.fitBounds(L.latLngBounds(latlngs), { padding: [24, 24] });

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: US National Park Service',
    maxZoom: 8
  }).addTo(map);

  setTimeout(() => map.invalidateSize(), 100);

  const cluster = L.markerClusterGroup({
    maxClusterRadius: 40,
    showCoverageOnHover: false,
  });

  const locs = DATA.activity.encounters.locations;
  locs.forEach(loc => {
    const label = loc.first === loc.last
      ? loc.first
      : `${loc.first} &ndash; ${loc.last}`;
    const plural = loc.count === 1 ? 'encounter' : 'encounters';
    const marker = L.circleMarker([loc.lat, loc.lng], {
      radius: Math.max(7, Math.min(16, 5 + Math.sqrt(loc.count))),
      fillColor: '#1a7a6e',
      color: '#ffffff',
      fillOpacity: 0.75,
      weight: 1.5,
    });
    marker.bindPopup(`
      <div style="font-family:'Lato',sans-serif; min-width:140px;">
        <div style="font-weight:900; font-size:15px; color:var(--text); margin-bottom:4px;">${loc.count} ${plural}</div>
        <div style="font-size:14px; color:var(--muted);">${label}</div>
      </div>
    `, { offset: [0, -4] });
    marker.on('mouseover', function() { this.setStyle({ fillOpacity: 1 }); });
    marker.on('mouseout', function() { this.setStyle({ fillOpacity: 0.75 }); });
    cluster.addLayer(marker);
  });

  map.addLayer(cluster);
}

// POKEMON GRID
const grid = document.getElementById('pokeGrid');
let allPokemon = DATA.collection.pokemon.map(p => p.name);

// Map display names from the GDPR export to PokeAPI slugs for edge cases.
// PokeAPI uses hyphens; these manual overrides handle names that don't
// survive the generic normalization (punctuation, gender symbols, etc.).
const NAME_OVERRIDES = {
  'nidoran f': 'nidoran-f',
  'nidoran m': 'nidoran-m',
  'nidoran♀': 'nidoran-f',
  'nidoran♂': 'nidoran-m',
  'mr mime': 'mr-mime',
  'mr rime': 'mr-rime',
  'mime jr': 'mime-jr',
  'mime jr.': 'mime-jr',
  'farfetchd': 'farfetchd',
  "farfetch'd": 'farfetchd',
  'sirfetchd': 'sirfetchd',
  "sirfetch'd": 'sirfetchd',
  'flabebe': 'flabebe',
  'type null': 'type-null',
  'jangmo o': 'jangmo-o',
  'hakamo o': 'hakamo-o',
  'kommo o': 'kommo-o',
  'tapu koko': 'tapu-koko',
  'tapu lele': 'tapu-lele',
  'tapu bulu': 'tapu-bulu',
  'tapu fini': 'tapu-fini',
  'ho oh': 'ho-oh',
  'porygon z': 'porygon-z',
};

function normalizeName(name) {
  const lower = name.toLowerCase().replace(/['.♀♂]/g, '').replace(/\s+/g, ' ').trim();
  if (NAME_OVERRIDES[lower]) return NAME_OVERRIDES[lower];
  return lower.replace(/\s+/g, '-');
}

const POGO_SPRITE_BASE = 'https://raw.githubusercontent.com/PokeMiners/pogo_assets/master/Images/Pokemon%20-%20256x256/Addressable%20Assets';

// Pokemon that have no base pm{id}.icon.png in pogo_assets — only named form
// variants. Maps national dex ID → the filename of their sensible default form.
const FORM_ONLY_SPRITES = {
  201: 'pm201.fUNOWN_A.icon.png',
  327: 'pm327.f00.icon.png',
  412: 'pm412.fBURMY_PLANT.icon.png',
  413: 'pm413.fWORMADAM_PLANT.icon.png',
  421: 'pm421.fOVERCAST.icon.png',
  422: 'pm422.fWEST_SEA.icon.png',
  423: 'pm423.fWEST_SEA.icon.png',
  479: 'pm479.f.icon.png',
  550: 'pm550.fRED_STRIPED.icon.png',
  555: 'pm555.fSTANDARD.icon.png',
  585: 'pm585.fSPRING.icon.png',
  586: 'pm586.fSPRING.icon.png',
  641: 'pm641.fINCARNATE.icon.png',
  642: 'pm642.fINCARNATE.icon.png',
  645: 'pm645.fINCARNATE.icon.png',
  646: 'pm646.fNORMAL.icon.png',
  647: 'pm647.fORDINARY.icon.png',
  649: 'pm649.fNORMAL.icon.png',
  666: 'pm666.fMEADOW.icon.png',
  670: 'pm670.fRED.icon.png',
  671: 'pm671.fRED.icon.png',
  676: 'pm676.fNATURAL.icon.png',
  681: 'pm681.fSHIELD.icon.png',
  718: 'pm718.fFIFTY_PERCENT.icon.png',
  741: 'pm741.fBAILE.icon.png',
  745: 'pm745.fMIDDAY.icon.png',
  746: 'pm746.fSOLO.icon.png',
  778: 'pm778.fDISGUISED.icon.png',
  849: 'pm849.fAMPED.icon.png',
  876: 'pm876.fMALE.icon.png',
  892: 'pm892.fSINGLE_STRIKE.icon.png',
  905: 'pm905.fINCARNATE.icon.png',
  925: 'pm925.fFAMILY_OF_THREE.icon.png',
  978: 'pm978.fCURLY.icon.png',
};

function getSpriteUrl(name) {
  const id = window.pokeNameToId?.[normalizeName(name)];
  if (!id) return null;
  const filename = FORM_ONLY_SPRITES[id] ?? `pm${id}.icon.png`;
  return `${POGO_SPRITE_BASE}/${filename}`;
}

// Non-Pokemon entries mixed into the GDPR export (eggs, items, badges)
// all contain a colon. No legitimate Pokemon name does.
function isPokemon(name) {
  return !name.includes(':');
}

function renderPokeCard(name) {
  const card = document.createElement('div');
  card.className = 'pokemon-card';
  const spriteUrl = getSpriteUrl(name);
  const id = window.pokeNameToId?.[normalizeName(name)];
  const numLabel = id ? `No. ${String(id).padStart(3, '0')}` : '';
  const spriteHtml = spriteUrl
    ? `<img class="poke-sprite" src="${spriteUrl}" alt="${name}" loading="lazy" onerror="var c=this.closest('.pokemon-card');this.outerHTML='<div class=\\'poke-sprite-unknown\\'>?</div>';c.classList.add('pokemon-card--unknown')">`
    : `<div class="poke-sprite-unknown">?</div>`;
  card.innerHTML = `
    ${spriteHtml}
    <div class="poke-name">${name}</div>
    ${numLabel ? `<div class="poke-num">${numLabel}</div>` : ''}
  `;
  return card;
}

function renderPokemon(list) {
  grid.innerHTML = '';
  const pokeOnly = list.filter(isPokemon);
  const countEl = document.createElement('div');
  countEl.className = 'pokemon-count-row';
  countEl.textContent = `Showing ${pokeOnly.length} Pokémon`;
  grid.appendChild(countEl);
  pokeOnly.forEach(name => grid.appendChild(renderPokeCard(name)));
}

window.filterPokemon = function filterPokemon() {
  const q = document.getElementById('pokeSearch').value.toLowerCase();
  const sort = document.getElementById('pokeSort').value;
  let list = q ? allPokemon.filter(p => p.toLowerCase().includes(q)) : allPokemon;
  list = [...list].sort((a, b) => {
    if (sort === 'name-az') return a.localeCompare(b);
    if (sort === 'name-za') return b.localeCompare(a);
    const ia = window.pokeNameToId?.[normalizeName(a)] ?? 9999;
    const ib = window.pokeNameToId?.[normalizeName(b)] ?? 9999;
    return sort === 'dex-asc' ? ia - ib : ib - ia;
  });
  renderPokemon(list);
}

function slugToDisplay(slug) {
  // Convert PokeAPI slug to a readable display name
  const SLUG_OVERRIDES = {
    'nidoran-f': 'Nidoran♀', 'nidoran-m': 'Nidoran♂',
    'mr-mime': 'Mr. Mime', 'mr-rime': 'Mr. Rime',
    'mime-jr': 'Mime Jr.', 'farfetchd': "Farfetch'd",
    'sirfetchd': "Sirfetch'd", 'flabebe': 'Flabébé',
    'type-null': 'Type: Null', 'jangmo-o': 'Jangmo-o',
    'hakamo-o': 'Hakamo-o', 'kommo-o': 'Kommo-o',
    'tapu-koko': 'Tapu Koko', 'tapu-lele': 'Tapu Lele',
    'tapu-bulu': 'Tapu Bulu', 'tapu-fini': 'Tapu Fini',
    'ho-oh': 'Ho-Oh', 'porygon-z': 'Porygon-Z',
  };
  if (SLUG_OVERRIDES[slug]) return SLUG_OVERRIDES[slug];
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

let allDex = [];

const GENS = [
  { name: 'Kanto',  min: 1,   max: 151  },
  { name: 'Johto',  min: 152, max: 251  },
  { name: 'Hoenn',  min: 252, max: 386  },
  { name: 'Sinnoh', min: 387, max: 493  },
  { name: 'Unova',  min: 494, max: 649  },
  { name: 'Kalos',  min: 650, max: 721  },
  { name: 'Alola',  min: 722, max: 809  },
  { name: 'Galar',  min: 810, max: 905  },
  { name: 'Paldea', min: 906, max: 1025 },
];

function getSpriteById(id) {
  const filename = FORM_ONLY_SPRITES[id] ?? `pm${id}.icon.png`;
  return `${POGO_SPRITE_BASE}/${filename}`;
}

function renderDexCard(entry, caught) {
  const card = document.createElement('div');
  card.className = 'pokemon-card' + (caught ? '' : ' pokemon-card--uncaught');
  card.innerHTML = `
    <img class="poke-sprite" src="${getSpriteById(entry.id)}" alt="${entry.display}" loading="lazy" onerror="this.outerHTML='<div class=\\'poke-sprite-unknown\\'>?</div>'">
    <div class="poke-name">${entry.display}</div>
    <div class="poke-num">No. ${String(entry.id).padStart(3, '0')}</div>
  `;
  return card;
}

window.filterPokedex = function filterPokedex() {
  const q = document.getElementById('dexSearch').value.toLowerCase();
  const genVal = document.getElementById('dexGenFilter').value;
  const container = document.getElementById('dexGrid');
  container.innerHTML = '';

  const dex = window.POKEDEX_DATA || {};
  const isCaught = id => dex[id]?.caught === true;

  const standardDex = allDex.filter(p => p.id >= 1 && p.id <= 1025);

  // Determine which gens to show
  const activeGens = genVal === 'all' ? GENS : GENS.filter((_, i) => String(i + 1) === genVal);

  // Flatten to entries within selected gen(s), then apply search
  const genFiltered = standardDex.filter(p => activeGens.some(g => p.id >= g.min && p.id <= g.max));
  const filtered = q ? genFiltered.filter(p => p.display.toLowerCase().includes(q)) : genFiltered;

  // Single-gen or search: flat grid with a header showing caught count
  if (genVal !== 'all' || q) {
    const caughtCount = filtered.filter(p => isCaught(p.id)).length;
    if (genVal !== 'all' && !q) {
      const gen = GENS[parseInt(genVal, 10) - 1];
      const header = document.createElement('div');
      header.className = 'pokedex-gen-header';
      header.innerHTML = `
        <span class="pokedex-gen-name">${gen.name}</span>
        <span class="pokedex-gen-count">${caughtCount} / ${filtered.length} caught</span>
      `;
      container.appendChild(header);
    } else {
      const countEl = document.createElement('div');
      countEl.className = 'pokemon-count-row';
      countEl.textContent = q
        ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`
        : `${caughtCount} / ${filtered.length} caught`;
      container.appendChild(countEl);
    }
    const flatGrid = document.createElement('div');
    flatGrid.className = 'pokemon-grid';
    filtered.forEach(p => flatGrid.appendChild(renderDexCard(p, isCaught(p.id))));
    container.appendChild(flatGrid);
    return;
  }

  // All gens: grouped view with per-gen headers
  GENS.forEach(gen => {
    const genEntries = standardDex.filter(p => p.id >= gen.min && p.id <= gen.max);
    if (genEntries.length === 0) return;
    const caughtCount = genEntries.filter(p => isCaught(p.id)).length;

    const header = document.createElement('div');
    header.className = 'pokedex-gen-header';
    header.innerHTML = `
      <span class="pokedex-gen-name">${gen.name}</span>
      <span class="pokedex-gen-count">${caughtCount} / ${genEntries.length} caught</span>
    `;
    container.appendChild(header);

    const subGrid = document.createElement('div');
    subGrid.className = 'pokemon-grid';
    genEntries.forEach(p => subGrid.appendChild(renderDexCard(p, isCaught(p.id))));
    container.appendChild(subGrid);
  });
};

async function buildPokeMap() {
  try {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=2000');
    const data = await res.json();
    window.pokeNameToId = {};
    data.results.forEach(({ name, url }) => {
      const id = parseInt(url.replace(/\/$/, '').split('/').pop(), 10);
      window.pokeNameToId[name] = id;
    });
    // Build sorted dex list from the PokeAPI results
    allDex = data.results
      .map(({ name, url }) => ({
        slug: name,
        display: slugToDisplay(name),
        id: parseInt(url.replace(/\/$/, '').split('/').pop(), 10)
      }))
      .sort((a, b) => a.id - b.id);
  } catch (e) {
    window.pokeNameToId = {};
    console.warn('Could not fetch Pokémon species list:', e);
  }
  filterPokemon();
  filterPokedex();
}

buildPokeMap();
  initMap();
} // end initApp

// Initialise once fieldbook.js has assigned window.FIELDBOOK_DATA
if (window.FIELDBOOK_DATA) {
  initApp(window.FIELDBOOK_DATA);
} else {
  document.body.style.cssText = 'font-family:sans-serif;padding:48px;color:#cc0000;';
  document.body.innerHTML = '<h2>Could not load fieldbook.js</h2><p>Make sure fieldbook.js is in the same folder as index.html.</p>';
}
